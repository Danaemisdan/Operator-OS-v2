<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Operator OS HUD</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: transparent !important;
    }
    #hud-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .vision-box {
      position: absolute;
      border: 1px dashed rgba(0, 255, 170, 0.4);
      background: rgba(0, 255, 170, 0.05);
      border-radius: 2px;
      pointer-events: none;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }
    .vision-box::before {
      content: attr(data-id) " █ " attr(data-text);
      position: absolute;
      top: -16px;
      left: -1px;
      background: #00ffaa;
      color: #000;
      font-size: 8px;
      padding: 2px 4px;
      border-radius: 2px 2px 0 0;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="hud-container"></div>
  <script>
    // Listen for elements from main process
    window.electronAPI.onUpdateHUD((elements) => {
      const container = document.getElementById('hud-container');
      container.replaceChildren();
      
      if (!elements || !elements.forEach) return;
      
      const fragment = document.createDocumentFragment();
      elements.forEach(el => {
        if (!el.bounds || el.bounds.width <= 0 || el.bounds.height <= 0) return;
        const box = document.createElement('div');
        box.className = 'vision-box';
        box.style.left = el.bounds.x + 'px';
        box.style.top = el.bounds.y + 'px';
        box.style.width = el.bounds.width + 'px';
        box.style.height = el.bounds.height + 'px';
        box.setAttribute('data-id', el.id || 'VIS');
        box.setAttribute('data-text', (el.text || '').substring(0, 20));
        fragment.appendChild(box);
      });
      container.appendChild(fragment);
    });
  </script>
</body>
</html>
